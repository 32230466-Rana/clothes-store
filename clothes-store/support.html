<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Support - Fashion Store</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="support-page">
    <div class="top-discount">🎀 Welcome to Our Fashion Store 🌸</div>

    <header class="navbar-area">
      <div class="container-fluid">
        <div class="row align-items-center">
          <div class="col-md-3 text-center text-md-start brand">
            <div class="brand-icon">FS</div>
            <p>The art of beauty</p>
          </div>

          <div class="col-md-6 text-center nav-center">
            <a href="home.html" class="nav-item-link">Home</a>
            <a href="about.html" class="nav-item-link">About Us</a>
            <a href="collection.html" class="nav-item-link">Collection</a>
            <a href="contact.html" class="nav-item-link">Contact</a>
          </div>

          <div class="col-md-3 text-center text-md-end search-area">
            <input type="text" placeholder="Search..." />
            <button type="button">👜</button>
          </div>
        </div>
      </div>
    </header>

    <section class="support-section">
      <div class="container">
        <div class="page-box support-page-box">
          <h1 class="support-title">Support</h1>

          <form class="support-form">
            <div class="mb-3">
              <label class="support-label">Your Name</label>
              <input
                type="text"
                class="form-control"
                placeholder="Enter your name"
              />
            </div>

            <div class="mb-3">
              <label class="support-label">Your Email</label>
              <input
                type="email"
                class="form-control"
                placeholder="Enter your email"
              />
            </div>

            <div class="mb-3">
              <label class="support-label">Your Message</label>
              <textarea
                class="form-control"
                rows="6"
                placeholder="Write your message"
              ></textarea>
            </div>

            <button type="submit" class="support-btn">
              Send Support Request
            </button>
          </form>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <div class="footer-copy">© 2026 Fashion Store</div>
      </div>
    </footer>
  </body>
</html>
