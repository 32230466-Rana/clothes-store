<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Size Guide - Fashion Store</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="size-guide-page">
    <div class="top-discount">🎀 Welcome to Our Fashion Store 🌸</div>

    <header class="navbar-area">
      <div class="container-fluid">
        <div class="row align-items-center">
          <div class="col-md-3 text-center text-md-left brand">
            <div class="brand-icon">FS</div>
            <p>The art of beauty</p>
          </div>

          <div class="col-md-6 text-center nav-center">
            <a href="home.html" class="nav-item-link">Home</a>
            <a href="about.html" class="nav-item-link">About Us</a>
            <a href="collection.html" class="nav-item-link">Collection</a>
            <a href="contact.html" class="nav-item-link">Contact</a>
          </div>

          <div class="col-md-3 text-center text-md-right search-area">
            <input type="text" placeholder="Search..." />
            <button type="button">👜</button>
          </div>
        </div>
      </div>
    </header>

    <section class="size-guide-section">
      <div class="container">
        <div class="page-box size-guide-page-box">
          <h1 class="size-guide-title">Size Guide</h1>

          <div class="size-guide-table-wrap">
            <table class="size-guide-table">
              <tr>
                <th>Size</th>
                <th>Chest</th>
                <th>Waist</th>
                <th>Hip</th>
              </tr>
              <tr>
                <td>S</td>
                <td>84 - 88 cm</td>
                <td>66 - 70 cm</td>
                <td>90 - 94 cm</td>
              </tr>
              <tr>
                <td>M</td>
                <td>89 - 93 cm</td>
                <td>71 - 75 cm</td>
                <td>95 - 99 cm</td>
              </tr>
              <tr>
                <td>L</td>
                <td>94 - 98 cm</td>
                <td>76 - 80 cm</td>
                <td>100 - 104 cm</td>
              </tr>
              <tr>
                <td>XL</td>
                <td>99 - 103 cm</td>
                <td>81 - 85 cm</td>
                <td>105 - 109 cm</td>
              </tr>
            </table>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <div class="footer-copy">© 2026 Fashion Store</div>
      </div>
    </footer>
  </body>
</html>
